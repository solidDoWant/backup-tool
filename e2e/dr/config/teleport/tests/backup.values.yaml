---
jobConfig:
  configFile:
    backupName: tp-e2e
    cnpgClusters:
      core:
        name: teleport-core
      audit:
        name: teleport-audit
    backupSnapshot:
      snapshotClass: openebs-zfs
    clusterCloning:
      # The clone mints its serving + client-CA certs from an internally-created self-signed issuer;
      # approver-policy is enforcing in e2e, so enable each cert's CertificateRequestPolicy.
      certificates:
        servingCert:
          certificateRequestPolicy:
            enabled: true
        clientCACert:
          certificateRequestPolicy:
            enabled: true
        postgresUserCert:
          certificateRequestPolicy:
            enabled: true
        streamingReplicaUserCert:
          certificateRequestPolicy:
            enabled: true
    auditSessionLogs:
      s3Path: s3://teleport-audit-session-logs/
      credentials:
        endpoint: http://seaweedfs-s3:8333
        region: dummy-value
        s3ForcePathStyle: true
