---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
controllers:
  authentik-postgres-wal-bucket:
    type: job
    containers:
      create-bucket:
        image:
          repository: d3fk/s3cmd
          tag: latest
        command:
          - s3cmd
        args:
          - --access_key=$(AWS_ACCESS_KEY_ID)
          - --secret_key=$(AWS_SECRET_ACCESS_KEY)
          - --host=seaweedfs-s3:8333
          - --host-bucket=seaweedfs-s3:8333
          - --no-ssl
          - mb
          - s3://authentik-postgres-wal/
        env:
          AWS_ACCESS_KEY_ID:
            valueFrom:
              secretKeyRef:
                name: seaweedfs-s3-secret
                key: admin_access_key_id
          AWS_SECRET_ACCESS_KEY:
            valueFrom:
              secretKeyRef:
                name: seaweedfs-s3-secret
                key: admin_secret_access_key
  # Enable versioning on the media bucket so the DR backup exercises backup-tool's version-aware
  # point-in-time capture path. Uses the MinIO client (mc) rather than s3cmd, which can't configure
  # versioning. (Objects only ever have one version here; this just verifies the PIT path works.)
  authentik-media-bucket:
    type: job
    containers:
      create-bucket:
        image:
          repository: minio/mc
          tag: latest
        command:
          - /bin/sh
          - -c
        args:
          - |
            mc alias set sw http://seaweedfs-s3:8333 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" && \
            mc mb --ignore-existing sw/authentik-media && \
            mc version enable sw/authentik-media
        env:
          AWS_ACCESS_KEY_ID:
            valueFrom:
              secretKeyRef:
                name: seaweedfs-s3-secret
                key: admin_access_key_id
          AWS_SECRET_ACCESS_KEY:
            valueFrom:
              secretKeyRef:
                name: seaweedfs-s3-secret
                key: admin_secret_access_key
rawResources:
  authentik-postgres-serving-cert:
    forceRename: authentik-postgres-serving-cert
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: Teleport Core Postgres serving
        dnsNames:
          - authentik-postgres-rw
          - authentik-postgres-rw.default.svc
        usages:
          - server auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: self-signed
          kind: Issuer
          group: cert-manager.io
        secretName: authentik-postgres-serving-cert
  authentik-postgres-streaming-replica-user-cert:
    forceRename: authentik-postgres-streaming-replica-user-cert
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: streaming_replica
        usages:
          - client auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: authentik-postgres-auth-ca-issuer
          kind: Issuer
          group: cert-manager.io
        secretName: authentik-postgres-streaming-replica-user-cert
  authentik-postgres-authentik-cert:
    forceRename: authentik-postgres-authentik-user-cert
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: authentik
        usages:
          - client auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: authentik-postgres-auth-ca-issuer
          kind: Issuer
          group: cert-manager.io
        secretName: authentik-postgres-authentik-user-cert
  # WAL archiving is handled by the barman-cloud plugin. The plugin reads the bucket/credentials from
  # this ObjectStore resource, which the cluster references by name via .spec.plugins.
  authentik-postgres-wal-objectstore:
    forceRename: authentik-wal-store
    manifest:
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
      spec:
        configuration:
          destinationPath: s3://authentik-postgres-wal/
          endpointURL: http://seaweedfs-s3:8333
          s3Credentials:
            accessKeyId:
              name: seaweedfs-s3-secret
              key: admin_access_key_id
            secretAccessKey:
              name: seaweedfs-s3-secret
              key: admin_secret_access_key
  authentik-postgres-cluster:
    forceRename: authentik-postgres
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      spec:
        instances: 2 # One replica, one primary
        bootstrap:
          initdb:
            database: authentik
            owner: authentik
            postInitSQL:
              - ALTER USER "authentik" WITH PASSWORD NULL;
        postgresql:
          pg_hba:
            - hostssl authentik all all cert
        storage:
          size: 5Gi
          storageClass: openebs-zfs
        plugins:
          - name: barman-cloud.cloudnative-pg.io
            isWALArchiver: true
            parameters:
              barmanObjectName: authentik-wal-store
        backup:
          target: prefer-standby
          volumeSnapshot:
            className: openebs-zfs
            online: true
            onlineConfiguration:
              immediateCheckpoint: false
              waitForArchive: true
            snapshotOwnerReference: backup
        certificates:
          serverTLSSecret: authentik-postgres-serving-cert
          serverCASecret: authentik-postgres-serving-cert
          clientCASecret: authentik-postgres-client-ca-cert
          replicationTLSSecret: authentik-postgres-streaming-replica-user-cert
