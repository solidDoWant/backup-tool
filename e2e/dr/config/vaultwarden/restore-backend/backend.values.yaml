---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
# The restore WAL bucket (s3://vaultwarden-restore-wal/, distinct from the source instance's) isn't
# pre-created here — the barman-cloud WAL archiver creates its destination bucket on first archive.
persistence:
  restore-data-vol:
    suffix: restore-data-vol
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: openebs-zfs
rawResources:
  postgres-restore-serving-cert:
    forceRename: postgres-restore-serving-cert
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: VaultWarden Postgres restore serving
        dnsNames:
          - vaultwarden-restore-rw
          - vaultwarden-restore-rw.default.svc
        usages:
          - server auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: self-signed
          kind: Issuer
          group: cert-manager.io
        secretName: postgres-restore-serving-cert
  postgres-restore-streaming-replica-cert:
    forceRename: postgres-restore-streaming-replica-cert
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: streaming_replica
        usages:
          - client auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: postgres-restore-auth-ca-issuer
          kind: Issuer
          group: cert-manager.io
        secretName: postgres-restore-streaming-replica-cert
  # See the instance backend values for why WAL archiving uses the barman-cloud plugin. This is a
  # separate object store/bucket from the source instance.
  postgres-restore-wal-objectstore:
    forceRename: vaultwarden-restore-wal-store
    manifest:
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
      spec:
        configuration:
          destinationPath: s3://vaultwarden-restore-wal/
          endpointURL: http://seaweedfs-s3:8333
          s3Credentials:
            accessKeyId:
              name: seaweedfs-s3-secret
              key: admin_access_key_id
            secretAccessKey:
              name: seaweedfs-s3-secret
              key: admin_secret_access_key
  postgres-restore-vaultwarden-cluster:
    forceRename: vaultwarden-restore
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      spec:
        instances: 2 # One replica, one primary
        bootstrap:
          initdb:
            database: vaultwarden
            owner: vaultwarden
            postInitSQL:
              - ALTER USER vaultwarden WITH PASSWORD NULL;
        postgresql:
          pg_hba:
            - hostssl all all all cert # Allow the restore job to connect to all databases via TLS
        storage:
          size: 5Gi
          storageClass: openebs-zfs
        plugins:
          - name: barman-cloud.cloudnative-pg.io
            isWALArchiver: true
            parameters:
              barmanObjectName: vaultwarden-restore-wal-store
        backup:
          target: prefer-standby
          volumeSnapshot:
            className: openebs-zfs
            online: true
            onlineConfiguration:
              immediateCheckpoint: false
              waitForArchive: true
            snapshotOwnerReference: backup
        certificates:
          serverTLSSecret: postgres-restore-serving-cert
          serverCASecret: postgres-restore-serving-cert
          clientCASecret: postgres-restore-client-ca-cert
          replicationTLSSecret: postgres-restore-streaming-replica-cert
