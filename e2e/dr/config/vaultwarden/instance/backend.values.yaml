---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
# The WAL bucket (s3://vaultwarden-wal/) isn't pre-created here — the barman-cloud WAL archiver
# creates its destination bucket on first archive.
rawResources:
  postgres-serving-cert:
    forceRename: postgres-serving-cert
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: VaultWarden Postgres serving
        dnsNames:
          - vaultwarden-rw
          - vaultwarden-rw.default.svc
        usages:
          - server auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: self-signed
          kind: Issuer
          group: cert-manager.io
        secretName: postgres-serving-cert
  postgres-streaming-replica-cert:
    forceRename: postgres-streaming-replica-cert
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: streaming_replica
        usages:
          - client auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: postgres-auth-ca-issuer
          kind: Issuer
          group: cert-manager.io
        secretName: postgres-streaming-replica-cert
  postgres-vaultwarden-cert:
    forceRename: postgres-vaultwarden-cert
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: vaultwarden
        usages:
          - client auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: postgres-auth-ca-issuer
          kind: Issuer
          group: cert-manager.io
        secretName: postgres-vaultwarden-cert
  # WAL archiving is handled by the barman-cloud plugin. The plugin reads the bucket/credentials from
  # this ObjectStore resource, which the cluster references by name via .spec.plugins.
  postgres-wal-objectstore:
    forceRename: vaultwarden-wal-store
    manifest:
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
      spec:
        configuration:
          destinationPath: s3://vaultwarden-wal/
          endpointURL: http://seaweedfs-s3:8333
          s3Credentials:
            accessKeyId:
              name: seaweedfs-s3-secret
              key: admin_access_key_id
            secretAccessKey:
              name: seaweedfs-s3-secret
              key: admin_secret_access_key
  postgres-vaultwarden-cluster:
    forceRename: vaultwarden
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      spec:
        instances: 2 # One replica, one primary
        bootstrap:
          initdb:
            database: vaultwarden
            owner: vaultwarden
            postInitSQL:
              - ALTER USER vaultwarden WITH PASSWORD NULL;
        postgresql:
          pg_hba:
            - hostssl vaultwarden all all cert
        storage:
          size: 5Gi
          storageClass: openebs-zfs
        plugins:
          - name: barman-cloud.cloudnative-pg.io
            isWALArchiver: true
            parameters:
              barmanObjectName: vaultwarden-wal-store
        backup:
          target: prefer-standby
          volumeSnapshot:
            className: openebs-zfs
            online: true
            onlineConfiguration:
              immediateCheckpoint: false
              waitForArchive: true
            snapshotOwnerReference: backup
        certificates:
          serverTLSSecret: postgres-serving-cert
          serverCASecret: postgres-serving-cert
          clientCASecret: postgres-client-ca-cert
          replicationTLSSecret: postgres-streaming-replica-cert
