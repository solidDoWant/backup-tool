---
jobConfig:
  configFile:
    backupName: vw-e2e
    dataPVCName: vaultwarden
    cnpgClusterName: vaultwarden
    clusterCloning:
      # The clone mints its serving + client-CA certs from an internally-created self-signed issuer;
      # approver-policy is enforcing in e2e, so enable each cert's CertificateRequestPolicy.
      certificates:
        servingCert:
          certificateRequestPolicy:
            enabled: true
        clientCACert:
          certificateRequestPolicy:
            enabled: true
        postgresUserCert:
          certificateRequestPolicy:
            enabled: true
        streamingReplicaUserCert:
          certificateRequestPolicy:
            enabled: true
    backupToolPodCreationTimeout: 10m
    backupSnapshot:
      snapshotClass: openebs-zfs
