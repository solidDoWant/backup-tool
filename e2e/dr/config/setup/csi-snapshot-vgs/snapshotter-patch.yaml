# Strategic-merge patch (by the DeploySnapshotVGS step) for the fetched host-path plugin's csi-snapshotter
# sidecar: bump v8.2.0 -> v8.6.0 to match the snapshot-controller (a mismatched sidecar never populates the
# group snapshot's member list, so the per-PVC VolumeSnapshots are never created) and enable the
# CSIVolumeGroupSnapshot feature gate.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: csi-hostpathplugin
spec:
  template:
    spec:
      containers:
        - name: csi-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.6.0
          args:
            - -v=5
            - --csi-address=/csi/csi.sock
            - --feature-gates=CSIVolumeGroupSnapshot=true
