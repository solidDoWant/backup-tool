---
rawResources:
  # Storage
  storageClass:
    forceRename: openebs-zfs
    manifest:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
      provisioner: zfs.csi.openebs.io
      parameters:
        poolname: openebs-zpool
        fstype: zfs
  volumeSnapshotClass:
    forceRename: openebs-zfs
    manifest:
      kind: VolumeSnapshotClass
      apiVersion: snapshot.storage.k8s.io/v1
      metadata:
        annotations:
          snapshot.storage.kubernetes.io/is-default-class: "true"
      driver: zfs.csi.openebs.io
      deletionPolicy: Delete
  # Host-path CSI driver storage classes (the driver itself is installed by the DeploySnapshotVGS setup
  # step). openebs zfs-localpv can't take VolumeGroupSnapshots, so the generic app's fileGroups coverage uses
  # the host-path driver instead; these stay NON-default so the existing apps keep openebs-zfs. Defined here
  # rather than in the csi-snapshot-vgs kustomize so the snapshot CRDs exist before the VolumeGroupSnapshotClass.
  hostpathStorageClass:
    forceRename: csi-hostpath-sc
    manifest:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      provisioner: hostpath.csi.k8s.io
      reclaimPolicy: Delete
      volumeBindingMode: Immediate
  hostpathVolumeSnapshotClass:
    forceRename: csi-hostpath-snapclass
    manifest:
      kind: VolumeSnapshotClass
      apiVersion: snapshot.storage.k8s.io/v1
      driver: hostpath.csi.k8s.io
      deletionPolicy: Delete
  hostpathVolumeGroupSnapshotClass:
    forceRename: csi-hostpath-groupsnapclass
    manifest:
      kind: VolumeGroupSnapshotClass
      apiVersion: groupsnapshot.storage.k8s.io/v1
      driver: hostpath.csi.k8s.io
      deletionPolicy: Delete
  # x509
  selfSignedCert:
    forceRename: self-signed
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Issuer
      spec:
        selfSigned: {}
  requestPolicy:
    forceRename: self-signed-issuer
    manifest:
      apiVersion: policy.cert-manager.io/v1alpha1
      kind: CertificateRequestPolicy
      spec:
        selector:
          issuerRef:
            group: cert-manager.io
            kind: Issuer
            name: self-signed
        allowed: &allowed_all
          isCA: true
          commonName: &all_value
            value: "*"
          dnsNames: &all_values
            values:
              - "*"
          emailAddresses: *all_values
          ipAddresses: *all_values
          subject:
            countries: *all_values
            localities: *all_values
            organizationalUnits: *all_values
            organizations: *all_values
            postalCodes: *all_values
            provinces: *all_values
            serialNumber: *all_value
            streetAddresses: *all_values
          uris: *all_values
          usages:
            - signing
            - digital signature
            - content commitment
            - key encipherment
            - key agreement
            - data encipherment
            - cert sign
            - crl sign
            - encipher only
            - decipher only
            - any
            - server auth
            - client auth
            - code signing
            - email protection
            - s/mime
            - ipsec end system
            - ipsec tunnel
            - ipsec user
            - timestamping
            - ocsp signing
            - microsoft sgc
            - netscape sgc
  # The barman-cloud plugin creates its own self-signed Issuer for its gRPC serving/client certs.
  # approver-policy denies every CertificateRequest without a matching policy, so without this the
  # plugin's certs never issue and its pod hangs waiting for the TLS secrets. The issuer name is
  # "<release>-selfsigned-issuer"; the release is named "plugin-barman-cloud" in the helmfile.
  barmanCloudRequestPolicy:
    forceRename: barman-cloud-plugin-selfsigned-issuer
    manifest:
      apiVersion: policy.cert-manager.io/v1alpha1
      kind: CertificateRequestPolicy
      spec:
        selector:
          issuerRef:
            group: cert-manager.io
            kind: Issuer
            name: plugin-barman-cloud-selfsigned-issuer
        allowed: *allowed_all
  requestPolicyRole:
    forceRename: cert-manager-policy:cert-manager
    manifest:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      rules:
        - apiGroups:
            - policy.cert-manager.io
          resources:
            - certificaterequestpolicies
          verbs:
            - use
  requestPolicyRoleBinding:
    forceRename: cert-manager-policy:cert-manager
    manifest:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cert-manager-policy:cert-manager
      subjects:
        - kind: ServiceAccount
          namespace: default
          name: cert-manager
