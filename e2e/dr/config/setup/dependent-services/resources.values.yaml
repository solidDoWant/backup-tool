---
rawResources:
  # Storage
  storageClass:
    forceRename: openebs-zfs
    manifest:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
      provisioner: zfs.csi.openebs.io
      parameters:
        poolname: openebs-zpool
        fstype: zfs
  volumeSnapshotClass:
    forceRename: openebs-zfs
    manifest:
      kind: VolumeSnapshotClass
      apiVersion: snapshot.storage.k8s.io/v1
      metadata:
        annotations:
          snapshot.storage.kubernetes.io/is-default-class: "true"
      driver: zfs.csi.openebs.io
      deletionPolicy: Delete
  # x509
  selfSignedCert:
    forceRename: self-signed
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Issuer
      spec:
        selfSigned: {}
  requestPolicy:
    forceRename: self-signed-issuer
    manifest:
      apiVersion: policy.cert-manager.io/v1alpha1
      kind: CertificateRequestPolicy
      spec:
        selector:
          issuerRef:
            group: cert-manager.io
            kind: Issuer
            name: self-signed
        allowed:
          isCA: true
          commonName: &all_value
            value: "*"
          dnsNames: &all_values
            values:
              - "*"
          emailAddresses: *all_values
          ipAddresses: *all_values
          subject:
            countries: *all_values
            localities: *all_values
            organizationalUnits: *all_values
            organizations: *all_values
            postalCodes: *all_values
            provinces: *all_values
            serialNumber: *all_value
            streetAddresses: *all_values
          uris: *all_values
          usages:
            - signing
            - digital signature
            - content commitment
            - key encipherment
            - key agreement
            - data encipherment
            - cert sign
            - crl sign
            - encipher only
            - decipher only
            - any
            - server auth
            - client auth
            - code signing
            - email protection
            - s/mime
            - ipsec end system
            - ipsec tunnel
            - ipsec user
            - timestamping
            - ocsp signing
            - microsoft sgc
            - netscape sgc
  requestPolicyRole:
    forceRename: cert-manager-policy:cert-manager
    manifest:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      rules:
        - apiGroups:
            - policy.cert-manager.io
          resources:
            - certificaterequestpolicies
          verbs:
            - use
  requestPolicyRoleBinding:
    forceRename: cert-manager-policy:cert-manager
    manifest:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cert-manager-policy:cert-manager
      subjects:
        - kind: ServiceAccount
          namespace: default
          name: cert-manager
