---
# yaml-language-server: $schema=https://artifacthub.io/api/v1/packages/8d3dd90d-2369-4830-b210-1f0fe0dab886/0.27.1/values-schema
# Pin to the latest 1.28.x operator (the chart's appVersion is 1.28.1).
image:
  tag: "1.28.2"
crds:
  create: true
config:
  data:
    # Only inherit labels that CloudNativePG does not manage itself. `app.kubernetes.io/name`
    # and `app.kubernetes.io/component` are set by CNPG on the resources it creates (e.g.
    # `app.kubernetes.io/name=postgresql` on PVCs) and are used as internal label selectors.
    # These clusters are deployed via the bjw-s app-template chart, which stamps
    # `app.kubernetes.io/name=<release>` onto the Cluster; inheriting it overwrites CNPG's own
    # value on the PVCs. As of CNPG 1.28 the volume-snapshot backup path selects the instance
    # PVCs with `app.kubernetes.io/name=postgresql`, so the override makes PVC discovery return
    # nothing and the backup hangs forever in the "started" phase. Only inherit the instance
    # label, which CNPG does not manage and is the useful one for netpols.
    INHERITED_LABELS: app.kubernetes.io/instance
