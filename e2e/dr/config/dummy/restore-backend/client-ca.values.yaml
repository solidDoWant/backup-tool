---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
# Shared Postgres client CA for the dummy app's two restore-target clusters. The same CA signs the
# restore job's Postgres user cert and the `app` cert the e2e verification job uses to read back data.
rawResources:
  dummy-restore-postgres-client-ca-cert:
    forceRename: dummy-restore-postgres-client-ca
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: Dummy Restore Postgres client CA
        isCA: true
        usages:
          - cert sign
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: self-signed
          kind: Issuer
          group: cert-manager.io
        secretName: dummy-restore-postgres-client-ca
  dummy-restore-postgres-auth-ca-issuer:
    forceRename: dummy-restore-postgres-auth-ca-issuer
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Issuer
      spec:
        ca:
          secretName: dummy-restore-postgres-client-ca
  dummy-restore-postgres-auth-ca-request-policy:
    forceRename: dummy-restore-postgres-auth-ca-request-policy
    manifest:
      apiVersion: policy.cert-manager.io/v1alpha1
      kind: CertificateRequestPolicy
      spec:
        selector:
          issuerRef:
            group: cert-manager.io
            kind: Issuer
            name: dummy-restore-postgres-auth-ca-issuer
        allowed:
          commonName:
            required: true
            value: "*"
          usages:
            - client auth
