---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
# The dummy app has no real workload. This backend stands up everything the generic DR config captures:
# two seeded CNPG clusters, two seeded S3 buckets, and one seeded data PVC — so a backup has real content
# to capture and a restore has real content to reproduce.
controllers:
  # --- WAL buckets (barman-cloud archiving target for each source cluster) ---
  dummy-db1-wal-bucket:
    type: job
    containers:
      create-bucket:
        image:
          repository: d3fk/s3cmd
          tag: latest
        command:
          - s3cmd
        args:
          - --access_key=$(AWS_ACCESS_KEY_ID)
          - --secret_key=$(AWS_SECRET_ACCESS_KEY)
          - --host=seaweedfs-s3:8333
          - --host-bucket=seaweedfs-s3:8333
          - --no-ssl
          - mb
          - s3://dummy-db1-wal/
        env: &s3Env
          AWS_ACCESS_KEY_ID:
            valueFrom:
              secretKeyRef:
                name: seaweedfs-s3-secret
                key: admin_access_key_id
          AWS_SECRET_ACCESS_KEY:
            valueFrom:
              secretKeyRef:
                name: seaweedfs-s3-secret
                key: admin_secret_access_key
  dummy-db2-wal-bucket:
    type: job
    containers:
      create-bucket:
        image:
          repository: d3fk/s3cmd
          tag: latest
        command:
          - s3cmd
        args:
          - --access_key=$(AWS_ACCESS_KEY_ID)
          - --secret_key=$(AWS_SECRET_ACCESS_KEY)
          - --host=seaweedfs-s3:8333
          - --host-bucket=seaweedfs-s3:8333
          - --no-ssl
          - mb
          - s3://dummy-db2-wal/
        env: *s3Env
  # --- Data buckets (the two S3 sources the generic config backs up), each seeded with one object ---
  dummy-bucket1-seed:
    type: job
    containers:
      seed-bucket:
        image:
          repository: minio/mc
          tag: latest
        command:
          - /bin/sh
          - -c
        args:
          - |
            mc alias set sw http://seaweedfs-s3:8333 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" && \
            mc mb --ignore-existing sw/dummy-bucket1 && \
            printf 'bucket1-seed' > /tmp/obj && \
            mc cp /tmp/obj sw/dummy-bucket1/seed.txt
        env: *s3Env
  dummy-bucket2-seed:
    type: job
    containers:
      seed-bucket:
        image:
          repository: minio/mc
          tag: latest
        command:
          - /bin/sh
          - -c
        args:
          - |
            mc alias set sw http://seaweedfs-s3:8333 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" && \
            mc mb --ignore-existing sw/dummy-bucket2 && \
            printf 'bucket2-seed' > /tmp/obj && \
            mc cp /tmp/obj sw/dummy-bucket2/seed.txt
        env: *s3Env
  # --- Source data PVC seed (writes known files into the files-source PVC) ---
  # Alongside the kept files (hello.txt, sub/keep.txt) it writes files the backup config's filter should
  # exclude: *.tmp at any depth (skip.tmp, sub/also.tmp) and everything under the top-level cache/ dir.
  dummy-data-seed:
    type: job
    containers:
      seed-data:
        image:
          repository: busybox
          tag: stable
        command:
          - /bin/sh
          - -c
        args:
          - mkdir -p /data/sub /data/cache && printf 'files-seed' > /data/hello.txt && printf 'nested-keep' > /data/sub/keep.txt && printf 'tmp' > /data/sub/also.tmp && printf 'tmp' > /data/skip.tmp && printf 'cache' > /data/cache/inner.txt
persistence:
  data-vol:
    suffix: data-vol # PVC name: dummy-backend-data-vol
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: openebs-zfs
    advancedMounts:
      dummy-data-seed:
        seed-data:
          - path: /data
rawResources:
  # --- File-group source: two label-selected PVCs on the VGS-capable host-path driver (openebs-zfs can't do
  # group snapshots), each seeded with a known file. The generic config's fileGroups source captures both
  # atomically as one VolumeGroupSnapshot; restore is in-place onto these same PVCs (resolved by the same
  # selector), so the dummy test corrupts them after the backup to make the restore a real round-trip. ---
  dummy-shard-a-pvc:
    forceRename: dummy-shard-a
    manifest:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        labels:
          app: dummy-fileshard
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: csi-hostpath-sc
        resources:
          requests:
            storage: 64Mi
  dummy-shard-b-pvc:
    forceRename: dummy-shard-b
    manifest:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        labels:
          app: dummy-fileshard
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: csi-hostpath-sc
        resources:
          requests:
            storage: 64Mi
  dummy-shard-seed-job:
    forceRename: dummy-shard-seed
    manifest:
      apiVersion: batch/v1
      kind: Job
      spec:
        backoffLimit: 6
        template:
          spec:
            restartPolicy: Never
            containers:
              - name: seed
                image: busybox:stable
                command:
                  - /bin/sh
                  - -c
                args:
                  # d.txt is the kept payload; skip.log in each shard is what the fileGroups filter excludes.
                  - printf 'shard-a-seed' > /a/d.txt && printf 'shard-b-seed' > /b/d.txt && printf 'log' > /a/skip.log && printf 'log' > /b/skip.log
                volumeMounts:
                  - name: a
                    mountPath: /a
                  - name: b
                    mountPath: /b
            volumes:
              - name: a
                persistentVolumeClaim:
                  claimName: dummy-shard-a
              - name: b
                persistentVolumeClaim:
                  claimName: dummy-shard-b
  dummy-db1-serving-cert:
    forceRename: dummy-db1-serving
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: Dummy DB1 Postgres serving
        dnsNames:
          - dummy-db1-rw
          - dummy-db1-rw.default.svc
        usages:
          - server auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: self-signed
          kind: Issuer
          group: cert-manager.io
        secretName: dummy-db1-serving
  dummy-db2-serving-cert:
    forceRename: dummy-db2-serving
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: Dummy DB2 Postgres serving
        dnsNames:
          - dummy-db2-rw
          - dummy-db2-rw.default.svc
        usages:
          - server auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: self-signed
          kind: Issuer
          group: cert-manager.io
        secretName: dummy-db2-serving
  dummy-postgres-streaming-replica-cert:
    forceRename: dummy-postgres-streaming-replica
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        commonName: streaming_replica
        usages:
          - client auth
        secretTemplate:
          labels:
            cnpg.io/reload: "true"
        issuerRef:
          name: dummy-postgres-auth-ca-issuer
          kind: Issuer
          group: cert-manager.io
        secretName: dummy-postgres-streaming-replica
  dummy-db1-wal-objectstore:
    forceRename: dummy-db1-wal-store
    manifest:
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
      spec:
        configuration:
          destinationPath: s3://dummy-db1-wal/
          endpointURL: http://seaweedfs-s3:8333
          s3Credentials: &walCreds
            accessKeyId:
              name: seaweedfs-s3-secret
              key: admin_access_key_id
            secretAccessKey:
              name: seaweedfs-s3-secret
              key: admin_secret_access_key
  dummy-db2-wal-objectstore:
    forceRename: dummy-db2-wal-store
    manifest:
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
      spec:
        configuration:
          destinationPath: s3://dummy-db2-wal/
          endpointURL: http://seaweedfs-s3:8333
          s3Credentials: *walCreds
  dummy-db1-cluster:
    forceRename: dummy-db1
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      spec:
        instances: 2
        bootstrap:
          initdb:
            database: app
            owner: app
            postInitSQL:
              - ALTER USER "app" WITH PASSWORD NULL;
            postInitApplicationSQL:
              - CREATE TABLE dr_test (id int PRIMARY KEY, val text);
              - INSERT INTO dr_test VALUES (1, 'db1-seed');
        postgresql:
          pg_hba:
            - hostssl app all all cert
        storage:
          size: 5Gi
          storageClass: openebs-zfs
        plugins:
          - name: barman-cloud.cloudnative-pg.io
            isWALArchiver: true
            parameters:
              barmanObjectName: dummy-db1-wal-store
        backup:
          target: prefer-standby
          volumeSnapshot:
            className: openebs-zfs
            online: true
            onlineConfiguration:
              immediateCheckpoint: false
              waitForArchive: true
            snapshotOwnerReference: backup
        certificates:
          serverTLSSecret: dummy-db1-serving
          serverCASecret: dummy-db1-serving
          clientCASecret: dummy-postgres-client-ca
          replicationTLSSecret: dummy-postgres-streaming-replica
  dummy-db2-cluster:
    forceRename: dummy-db2
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      spec:
        instances: 2
        bootstrap:
          initdb:
            database: app
            owner: app
            postInitSQL:
              - ALTER USER "app" WITH PASSWORD NULL;
            postInitApplicationSQL:
              - CREATE TABLE dr_test (id int PRIMARY KEY, val text);
              - INSERT INTO dr_test VALUES (1, 'db2-seed');
        postgresql:
          pg_hba:
            - hostssl app all all cert
        storage:
          size: 5Gi
          storageClass: openebs-zfs
        plugins:
          - name: barman-cloud.cloudnative-pg.io
            isWALArchiver: true
            parameters:
              barmanObjectName: dummy-db2-wal-store
        backup:
          target: prefer-standby
          volumeSnapshot:
            className: openebs-zfs
            online: true
            onlineConfiguration:
              immediateCheckpoint: false
              waitForArchive: true
            snapshotOwnerReference: backup
        certificates:
          serverTLSSecret: dummy-db2-serving
          serverCASecret: dummy-db2-serving
          clientCASecret: dummy-postgres-client-ca
          replicationTLSSecret: dummy-postgres-streaming-replica
