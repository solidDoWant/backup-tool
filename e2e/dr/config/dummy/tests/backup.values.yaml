---
# Generic (config-driven) DR backup config for the synthetic "dummy" app. The S3 access/secret keys are
# injected at install time via --set (see the test); everything else is inline below.
jobConfig:
  configFile:
    backupName: dm-e2e
    backupVolume:
      storageClass: openebs-zfs
      snapshotClass: openebs-zfs
      size: 5Gi
    postgres:
      - name: db1 # => db1.sql
        cluster: dummy-db1
        clusterCloning: &clusterCloning
          # The clone mints its serving + client-CA certs from an internally-created self-signed issuer;
          # approver-policy is enforcing in e2e, so enable each cert's CertificateRequestPolicy.
          certificates:
            servingCert:
              certificateRequestPolicy:
                enabled: true
            clientCACert:
              certificateRequestPolicy:
                enabled: true
            postgresUserCert:
              certificateRequestPolicy:
                enabled: true
            streamingReplicaUserCert:
              certificateRequestPolicy:
                enabled: true
      - name: db2 # => db2.sql
        cluster: dummy-db2
        clusterCloning: *clusterCloning
    files:
      - name: files # => DR subdir "files"
        pvc: dummy-backend-data-vol
        # Whitelist/blacklist which files are captured. "**" crosses any depth; a bare name is anchored at
        # the PVC root, and excluding a directory prunes its whole subtree.
        exclude:
          - glob: "**/*.tmp" # any .tmp file, at any depth
          - glob: cache # the top-level cache/ dir and everything under it
    fileGroups:
      - name: shards # => DR subtree "fileGroups/shards/<pvc>"
        snapshotClass: csi-hostpath-groupsnapclass
        selector:
          matchLabels:
            app: dummy-fileshard
        # Applied identically to every member PVC of the group.
        exclude:
          - glob: "**/*.log"
    s3:
      - name: bucket1 # => DR subdir "bucket1"
        path: s3://dummy-bucket1/
        credentials: &s3Credentials
          endpoint: http://seaweedfs-s3:8333
          region: dummy-value
          s3ForcePathStyle: true
      - name: bucket2 # => DR subdir "bucket2"
        path: s3://dummy-bucket2/
        credentials: *s3Credentials
