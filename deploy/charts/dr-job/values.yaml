---
# backup-tool specific values. These populate several "resource" values.
jobConfig:
  drType: vaultwarden
  drAction: backup
  configFile: {}
  configType: ConfigMap
  type: cronjob
  cronjob:
    schedule: "@daily"
resources:
  controllers:
    backup-tool:
      type: "{{ .Values.jobConfig.type }}"
      cronjob:
        schedule: "{{ .Values.jobConfig.cronjob.schedule }}"
        parallelism: 1
        backoffLimit: 1
        ttlSecondsAfterFinished: 86400
        successfulJobsHistory: 3
        failedJobsHistory: 3
      pod:
        # Needed for k8s access to manage resources
        automountServiceAccountToken: true
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        restartPolicy: Never
        terminationGracePeriodSeconds: 600 # Give a job time to complete and/or cleanup
      containers:
        backup-tool:
          image:
            repository: ghcr.io/soliddowant/backup-tool
            tag: "{{ .Chart.AppVersion }}"
          args:
            - dr
            - "{{ .Values.jobConfig.drType }}"
            - "{{ .Values.jobConfig.drAction }}"
            - run
            - --config-file
            - /etc/backup-tool/config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
  persistence:
    backup-tool:
      identifier: config
      defaultMode: 0444
      items:
        - key: config.yaml
          path: config.yaml
      advancedMounts:
        backup-tool:
          backup-tool:
            - path: /etc/backup-tool/config.yaml
              subPath: config.yaml
              readOnly: true
    pod-labels:
      type: custom
      volumeSpec:
        downwardAPI:
          items:
            - path: labels
              fieldRef:
                fieldPath: metadata.labels
      advancedMounts:
        backup-tool:
          backup-tool:
            - path: /etc/backup-tool/labels
              subPath: labels
              readOnly: true
  serviceAccount:
    default: {}
  rbac:
    roles:
      backup-tool:
        type: ClusterRole
        rules:
          # TODO prefix all resources with a fixed name, and limit RBAC to that prefix with a wildcard
          # Core/baseline k8s resources
          - apiGroups:
              - ""
            resources:
              # Needed to deploy backup tool GRPC instances, and clean them up.
              - pods
              # Needed for cloning PVCs
              - persistentvolumeclaims
            verbs:
              - create
              - get
              - list
              - watch
              - delete
          # Pod exec
          # Needed to run psql in a source cluster's primary pod (over its local socket) to force a
          # restore point + WAL switch, so an idle source still archives the consistency-point WAL.
          # Only used when a backup enables clusterCloning.sourceWALArchive.
          - apiGroups:
              - ""
            resources:
              - pods/exec
            verbs:
              - create
          # Recovery jobs (read-only)
          # Needed to watch the CNPG-managed recovery Job of a cloned cluster, to tell whether a
          # point-in-time recovery reached its target or ran out of WAL.
          - apiGroups:
              - batch
            resources:
              - jobs
            verbs:
              - get
              - list
              - watch
          # Allow for determining if certain resource types are available
          - apiGroups:
              - apiextensions.k8s.io
            resources:
              - customresourcedefinitions
            verbs:
              - get
          # External snapshotter (volume snapshot) resources
          # Needed to snapshot volumes for cloning, and for making backup snapshots
          - apiGroups:
              - snapshot.storage.k8s.io
            resources:
              - volumesnapshots
            verbs:
              - create
              - get
              - list
              - watch
              - delete
          # CNPG resources
          # Needed for cloning CNPG clusters
          - apiGroups:
              - postgresql.cnpg.io
            resources:
              - backups
              - clusters
            verbs:
              - create
              - get
              - list
              - watch
              - delete
          # Barman-cloud plugin resources
          # Needed (read-only) to resolve the WAL archive server name when cloning a cluster that
          # uses the barman-cloud plugin instead of in-tree barman WAL archiving.
          - apiGroups:
              - barmancloud.cnpg.io
            resources:
              - objectstores
            verbs:
              - get
              - list
              - watch
          # Cert manager
          # Needed for authenticating with cloned CNPG clusters
          - apiGroups:
              - cert-manager.io
            resources:
              - issuers
              - clusterissuers
            verbs:
              - create
              - get
              - list
              - watch
              - delete
          - apiGroups:
              - cert-manager.io
            resources:
              - certificates
            verbs:
              - create
              - get
              - list
              - watch
              - delete
          # Allow for reissuing certificates
          - apiGroups:
              - cert-manager.io
            resources:
              - certificates/status
            verbs:
              - update
          # Cert manager approver policy
          # Needed for issuing certs for cloned CNPG clusters
          - apiGroups:
              - policy.cert-manager.io
            resources:
              - certificaterequestpolicies
            verbs:
              - create
              - get
              - list
              - watch
              - delete
    bindings:
      backup-tool-role:
        type: ClusterRoleBinding
        roleRef:
          identifier: backup-tool
        subjects:
          - identifier: default
